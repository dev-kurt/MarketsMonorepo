info:
  name: Global
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/global"
  headers:
    - name: accept
      value: application/json
    - name: x-cg-demo-api-key
      value: "{{cg_demo_api_key}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Global başarılı", function () {
            expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true

docs: |-
  Piyasa geneli özet — dashboard üst başlığı için.

  - **Metot:** `GET`
  - **URL:** `{{base_url}}/global`

  ## Yanıttaki kilit alanlar
  `data.total_market_cap.usd`, `data.total_volume.usd`,
  `data.market_cap_percentage.btc` (BTC dominansı),
  `data.active_cryptocurrencies`
