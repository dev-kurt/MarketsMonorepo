info:
  name: Ping
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/ping"
  headers:
    - name: accept
      value: application/json
    - name: x-cg-demo-api-key
      value: "{{cg_demo_api_key}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Ping succeeds", function () {
            expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true

docs: |-
  Verifies that the API is reachable and the key is valid.

  - **Method:** `GET`
  - **URL:** `{{base_url}}/ping`

  Sample response: `{ "gecko_says": "(V3) To the Moon!" }`
