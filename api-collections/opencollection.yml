opencollection: 1.0.0

info:
  name: Markets API (CoinGecko Demo)

docs:
  content: |-
    ### Markets — CoinGecko Demo API collection

    The CoinGecko Demo (free) endpoints used by the Markets app.

    - Base URL: `https://api.coingecko.com/api/v3`
    - Auth: `x-cg-demo-api-key` header (`cg_demo_api_key` from the environment)
    - Every successful request consumes 1 credit from the monthly quota.

    Folders map to features: Coins → coins-list / coin-detail.
  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
