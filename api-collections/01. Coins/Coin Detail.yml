info:
  name: Coin Detail
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/coins/{{coin_id}}?localization=false&tickers=false&market_data=true&community_data=false&developer_data=false&sparkline=false"
  headers:
    - name: accept
      value: application/json
    - name: x-cg-demo-api-key
      value: "{{cg_demo_api_key}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Coin Detail succeeds", function () {
            expect(res.getStatus()).to.equal(200);
        });
        test("DTO fields are present", function () {
            var d = res.getBody();
            ["id","symbol","name","description","image","market_cap_rank","market_data"]
              .forEach(function (f) { expect(d).to.have.property(f); });
            expect(d.market_data.current_price).to.have.property("usd");
        });

settings:
  encodeUrl: true

docs: |-
  Single coin detail — the source for the **coin-detail** feature.

  - **Method:** `GET`
  - **URL:** `{{base_url}}/coins/{{coin_id}}`

  ## Query parameters
  We switch off everything unnecessary to keep the payload small:
  - `localization=false` — skip descriptions in 50+ languages
  - `tickers=false` — skip the exchange list (very large)
  - `market_data=true` — **required**, price/cap come from here
  - `community_data=false`, `developer_data=false`, `sparkline=false`

  ## Fields we map (DTO contract)

  Unlike the list endpoint, this response is **nested**.

  | Path | Type | Usage |
  |------|------|-------|
  | `id` · `symbol` · `name` | String | Header |
  | `description.en` | String | Description text |
  | `image.large` | String (URL) | Large icon |
  | `market_cap_rank` | Int | Rank |
  | `market_data.current_price.usd` | Double | Price |
  | `market_data.price_change_percentage_24h` | Double | 24h change |
  | `market_data.market_cap.usd` | Long | Market cap |
  | `market_data.total_volume.usd` | Long | 24h volume |
  | `market_data.high_24h.usd` · `low_24h.usd` | Double | Intraday range |
  | `market_data.ath.usd` · `atl.usd` | Double | All-time high/low |
  | `market_data.circulating_supply` · `max_supply` | Double | Supply |

  ## ⚠️ DTO pitfalls (critical)
  - **Inconsistent schema:** `current_price`, `market_cap`, `ath` … are **maps keyed
    by currency** (`{"usd": 64495, "eur": ...}`) → `Map<String, Double>`.
    But `price_change_percentage_24h` is a **plain Double**, not a map.
    A naive DTO breaks here; model the two differently.
  - `circulating_supply` / `max_supply` are also plain Doubles (not maps).
  - `description.en` is long and may contain HTML `<a>` tags.
  - `max_supply` is `null` for some coins → make it nullable.
