info:
  name: Simple Price
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/simple/price?ids={{coin_id}}&vs_currencies={{vs_currency}}&include_24hr_change=true"
  headers:
    - name: accept
      value: application/json
    - name: x-cg-demo-api-key
      value: "{{cg_demo_api_key}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Simple Price başarılı", function () {
            expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true

docs: |-
  Hafif fiyat sorgusu — favori coin'lerin hızlı fiyat tazelemesi için.

  - **Metot:** `GET`
  - **URL:** `{{base_url}}/simple/price`

  ## Query parametreleri
  - `ids`: virgülle ayrılmış coin id'leri (ör. `bitcoin,ethereum`)
  - `vs_currencies`: para birimleri (ör. `usd`)
  - `include_24hr_change`: 24s değişim ekle
