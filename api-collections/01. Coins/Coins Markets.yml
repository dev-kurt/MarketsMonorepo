info:
  name: Coins Markets
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/coins/markets?vs_currency={{vs_currency}}&order=market_cap_desc&per_page=20&page=1&sparkline=false&price_change_percentage=24h"
  headers:
    - name: accept
      value: application/json
    - name: x-cg-demo-api-key
      value: "{{cg_demo_api_key}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Coins Markets succeeds", function () {
            expect(res.getStatus()).to.equal(200);
        });
        test("List is not empty", function () {
            expect(res.getBody().length).to.be.above(0);
        });
        test("DTO fields are present", function () {
            var c = res.getBody()[0];
            ["id","symbol","name","image","current_price",
             "price_change_percentage_24h","market_cap_rank","market_cap","total_volume"]
              .forEach(function (f) { expect(c).to.have.property(f); });
        });

settings:
  encodeUrl: true

docs: |-
  Paginated coin list with market data — the source for the **coins-list** feature.

  - **Method:** `GET`
  - **URL:** `{{base_url}}/coins/markets`

  ## Query parameters
  - `vs_currency` (required): price currency — we use `usd`
  - `order`: `market_cap_desc` (descending by market cap)
  - `per_page`: 20, `page`: 1-based (paging uses this)
  - `sparkline`: `false` (no mini chart — charts are out of MVP scope)
  - `price_change_percentage`: `24h`

  ## Fields we map (DTO contract)

  The response is a **flat array**; every element is a flat object (no nesting).

  | Field | Type | Usage |
  |-------|------|-------|
  | `id` | String | Detail navigation (`/coins/{id}`) |
  | `symbol` | String | Row symbol (btc) |
  | `name` | String | Row name (Bitcoin) |
  | `image` | String (URL) | MkAsyncImage icon |
  | `current_price` | **Double** | Price |
  | `price_change_percentage_24h` | **Double** | 24h change → green/red |
  | `market_cap_rank` | Int | Rank |
  | `market_cap` | Long | Market cap |
  | `total_volume` | Long | 24h volume |

  ## ⚠️ DTO pitfalls
  - `current_price` looks like an integer for large coins (`64490`) but is fractional
    for small ones (`0.00034`) → use **`Double`**, never `Int`.
  - `price_change_percentage_24h` and `market_cap_rank` can be `null` for some coins
    → make them nullable and fall back in the mapper.
  - `roi` can be `null` → not mapped.
  - ~18 fields we ignore (`ath`, `atl`, `fully_diluted_valuation`, …); thanks to
    `ignoreUnknownKeys = true` they need no DTO declaration.

  ## Paging
  CoinGecko returns **no total count** and no envelope, so paging is keyed:
  the next page exists only while a full page is returned
  (`nextKey = data.size < loadSize ? null : page + 1`), and placeholders are disabled.
